<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Secure Vault</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #333;
    }

    .status {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .status.locked {
      background: #ffebee;
      color: #c62828;
    }

    .status.unlocked {
      background: #e8f5e9;
      color: #2e7d32;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      background: #45a049;
    }

    button.secondary {
      background: #666;
    }

    button.secondary:hover {
      background: #555;
    }

    .error {
      color: #c62828;
      font-size: 12px;
      margin-top: 10px;
    }

    .info {
      font-size: 12px;
      color: #666;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <h2>Secure Vault</h2>

  <div id="status" class="status locked">
    Vault is locked
  </div>

  <button id="unlock-btn">Unlock Vault</button>
  <button id="lock-btn" class="secondary" style="display: none;">Lock Vault</button>

  <div id="error" class="error"></div>

  <div class="info">
    Make sure the desktop app is running and you're logged in.
  </div>

  <script src="popup.js"></script>
</body>
</html>
