<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Bastion</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      margin: 0;
    }

    h2 {
      margin: 0 0 15px 0;
      font-size: 18px;
      color: #333;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    button:hover {
      background: #45a049;
    }

    .secondary {
      background: #666;
    }

    .secondary:hover {
      background: #555;
    }

    .error {
      color: #c62828;
      font-size: 12px;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .info {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <h2>Bastion</h2>

  <div id="login-view">
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Master Password" />
    <button id="login-btn">Login</button>
    <div id="error" class="error"></div>
  </div>

  <div id="vault-view" class="hidden">
    <div class="info">Logged in as: <span id="user-email"></span></div>
    <button id="autofill-btn">Autofill This Page</button>
    <button id="lock-btn" class="secondary">Lock</button>
  </div>

  <script src="popup-simple.js"></script>
</body>

</html>
