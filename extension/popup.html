<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Secure Vault</title>
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      margin: 0;
    }
    h2 {
      margin: 0 0 20px 0;
      font-size: 18px;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #555;
    }
    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background: #45a049;
    }
    button.secondary {
      background: #f44336;
    }
    button.secondary:hover {
      background: #da190b;
    }
    .error {
      color: #f44336;
      font-size: 12px;
      margin-top: 10px;
    }
    .success {
      color: #4CAF50;
      font-size: 12px;
      margin-top: 10px;
    }
    .status {
      padding: 10px;
      background: #e8f5e9;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="login-view">
    <h2>Login to Vault</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" />
    </div>
    <button id="login-btn">Login</button>
    <div id="login-error" class="error"></div>
  </div>

  <div id="unlocked-view" class="hidden">
    <div class="status">
      ✓ Vault Unlocked
      <div style="font-size: 12px; color: #666; margin-top: 5px;">
        <span id="user-email"></span>
      </div>
    </div>
    <button id="lock-btn" class="secondary">Lock Vault</button>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
